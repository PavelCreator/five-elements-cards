<div class="tab-nav" *ngIf="showTabNav">
	<button class="tab-nav__button" [class.tab-nav__button--active]="activeTab === 'collection'" (click)="setActiveTab('collection')">
		Collection
	</button>
	<button class="tab-nav__button" [class.tab-nav__button--active]="activeTab === 'game'" (click)="setActiveTab('game')">
		Game
	</button>
	<button class="tab-nav__button" [class.tab-nav__button--active]="activeTab === 'settings'" (click)="setActiveTab('settings')">
		Settings
	</button>
</div>

<div class="root-wrapper" *ngIf="activeTab === 'collection'">
	<app-cards class="cards-wrapper" [ngStyle]="{'height': cardsWrapperHeight }"></app-cards>
	<app-arts class="arts-wrapper" [ngStyle]="{'height': artsWrapperHeight }"></app-arts>
	<app-menu></app-menu>
	<app-art-to-card-animation></app-art-to-card-animation>
</div>

<app-game-wrapper *ngIf="activeTab === 'game'"></app-game-wrapper>

<div class="settings-wrapper" *ngIf="activeTab === 'settings'">
	<div class="settings-panel">
		<div class="settings-title">Game Settings</div>
		<div class="settings-subtitle">Players</div>
		<div class="settings-buttons">
			<button type="button" class="settings-button" [class.settings-button--active]="playerCount === 2" (click)="setPlayerCount(2)">2</button>
			<button type="button" class="settings-button" [class.settings-button--active]="playerCount === 3" (click)="setPlayerCount(3)">3</button>
			<button type="button" class="settings-button" [class.settings-button--active]="playerCount === 4" (click)="setPlayerCount(4)">4</button>
			<button type="button" class="settings-button" [class.settings-button--active]="playerCount === 5" (click)="setPlayerCount(5)">5</button>
			<button type="button" class="settings-button" [class.settings-button--active]="playerCount === 6" (click)="setPlayerCount(6)">6</button>
		</div>
		<button type="button" class="settings-clear" (click)="clearPlayerCount()">Clear Player Count</button>
		<button type="button" class="settings-clear" [class.settings-button--active]="checkToCrossMode" (click)="toggleCheckToCrossMode()">
			Check To Two Cross {{ checkToCrossMode ? '[ON]' : '[OFF]' }}
		</button>
		<button type="button" class="settings-clear" [class.settings-button--active]="checkToThreeCrossMode" (click)="toggleCheckToThreeCrossMode()">
			Check To Three Cross {{ checkToThreeCrossMode ? '[ON]' : '[OFF]' }}
		</button>
		<button type="button" class="settings-clear" [class.settings-button--active]="checkToFourCrossMode" (click)="toggleCheckToFourCrossMode()">
			Check To Four Cross {{ checkToFourCrossMode ? '[ON]' : '[OFF]' }}
		</button>
		<button type="button" class="settings-clear" [class.settings-button--active]="check2toJokersMode" (click)="toggleCheck2toJokersMode()">
			Check 2 Jokers {{ check2toJokersMode ? '[ON]' : '[OFF]' }}
		</button>
		<button type="button" class="settings-clear" [class.settings-button--active]="check2to3JokersMode" (click)="toggleCheck2to3JokersMode()">
			Check 3 Jokers {{ check2to3JokersMode ? '[ON]' : '[OFF]' }}
		</button>
		<button type="button" class="settings-clear" [class.settings-button--active]="check2to4JokersMode" (click)="toggleCheck2to4JokersMode()">
			Check 4 Jokers {{ check2to4JokersMode ? '[ON]' : '[OFF]' }}
		</button>
		<button type="button" class="settings-clear" [class.settings-button--active]="darkThemeEnabled" (click)="toggleDarkTheme()">
			Dark Theme {{ darkThemeEnabled ? '[ON]' : '[OFF]' }}
		</button>

		<div class="settings-subtitle settings-subtitle--spaced">Win Conditions</div>
		<div class="settings-mode-buttons">
			<button
				type="button"
				class="settings-mode-button"
				[class.settings-mode-button--active]="winConditionMode === 'Grand'"
				(click)="setWinConditionMode('Grand')">
				Grand Game
			</button>
			<button
				type="button"
				class="settings-mode-button"
				[class.settings-mode-button--active]="winConditionMode === 'Blitz'"
				(click)="setWinConditionMode('Blitz')">
				Blitz Game
			</button>
		</div>

		<div class="settings-win-conditions-meta">
			Selected: {{ selectedWinConditionOptions.length }}/4
		</div>

		<div class="settings-win-conditions-grid">
			<button
				type="button"
				class="settings-win-condition"
				*ngFor="let condition of visibleWinConditionCards; let i = index; trackBy: trackByWinCondition"
				[class.settings-win-condition--active]="selectedWinConditionMap[condition.option ?? (i + 1)]"
				[class.win-condition-active]="selectedWinConditionMap[condition.option ?? (i + 1)]"
				[attr.data-selected]="selectedWinConditionMap[condition.option ?? (i + 1)] ? 'true' : 'false'"
				[attr.data-option]="condition.option ?? (i + 1)"
				(click)="toggleWinCondition(condition.option ?? (i + 1))">
				<div class="settings-win-condition-card-shell">
					<app-how-to-win [card]="condition"></app-how-to-win>
				</div>
			</button>
		</div>
	</div>
</div>
