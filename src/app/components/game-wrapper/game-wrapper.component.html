<div class="game-wrapper">
    <div class="game-setup" *ngIf="!playerCount">
        <div class="game-setup__panel">
            <div class="game-setup__title">Select Players</div>
            <div class="game-setup__subtitle">Choose number of players to start the game.</div>
            <div class="game-setup__buttons">
                <button type="button" class="game-setup__button" (click)="selectPlayerCount(2)">2</button>
                <button type="button" class="game-setup__button" (click)="selectPlayerCount(3)">3</button>
                <button type="button" class="game-setup__button" (click)="selectPlayerCount(4)">4</button>
                <button type="button" class="game-setup__button" (click)="selectPlayerCount(5)">5</button>
                <button type="button" class="game-setup__button" (click)="selectPlayerCount(6)">6</button>
            </div>
        </div>
    </div>

    <div class="game-layout" #gameLayout *ngIf="rows.length && playerCount">
        <app-player-column 
            [playerSlots]="leftPlayerSlots" 
            [side]="'left'" 
            [activePlayer]="activePlayer" 
            [playerNames]="playerNames"
            [editingPlayerIndex]="editingPlayerIndex"
            [playerHexagons]="playerHexagons"
            (activePlayerChange)="setActivePlayer($event)"
            (startRenameEvent)="startRename($event)"
            (saveRenameEvent)="saveRename($event.playerNumber, $event.name)"
            (cancelRenameEvent)="cancelRename()">
        </app-player-column>

        <div class="game-field">
            <div class="game-row" *ngFor="let row of rows">
                <div class="game-stack" *ngIf="row.stack.length">
                    <div class="card card--back" [ngClass]="{ 'card--view': !printModeEnabled, 'card--print': printModeEnabled }">
                        <div
                            class="card-overlay-wrap card-overlay-wrap-back card-overlay-wrap--no-reflection"
                            [ngClass]="{ 'card-overlay-wrap--no-reflection': !printModeEnabled }"
                            [ngStyle]="{ '--card-bg': 'url(' + row.backUrl + ')' }"
                        >
                            <div class="card-overlay card-overlay-back"></div>
                        </div>
                    </div>
                </div>
                <div class="game-row-cards">
                    <app-card *ngFor="let card of row.topCards" [card]="card" [disableHoverUi]="true"></app-card>
                    <ng-container *ngFor="let specialStack of row.specialStacks">
                        <div class="game-stack" *ngIf="specialStack.stack.length">
                            <app-card [card]="specialStack.topCard" [disableHoverUi]="true"></app-card>
                        </div>
                    </ng-container>
                </div>
            </div>
            <div class="game-row game-row--hex">
                    <div class="game-hex-row">
                        <button class="roll-wrapper" type="button" aria-label="Roll dice" [disabled]="isDiceRollDisabled" (click)="rollDice(diceCount)">
                            <div class="roll-label">Roll</div>
                            <app-hexagon [color]="'dice'" [number]="diceCount" [type]="'gameBank'"></app-hexagon>
                        </button>
                    <button class="roll-wrapper" type="button" aria-label="Red bank" (click)="onHexagonClick('red')" [disabled]="isHexagonDisabled('red')">
                        <app-hexagon [color]="'red'" [number]="gameBankHexagons['red']" [type]="'gameBank'"></app-hexagon>
                    </button>
                    <button class="roll-wrapper" type="button" aria-label="Blue bank" (click)="onHexagonClick('blue')" [disabled]="isHexagonDisabled('blue')">
                        <app-hexagon [color]="'blue'" [number]="gameBankHexagons['blue']" [type]="'gameBank'"></app-hexagon>
                    </button>
                    <button class="roll-wrapper" type="button" aria-label="White bank" (click)="onHexagonClick('white')" [disabled]="isHexagonDisabled('white')">
                        <app-hexagon [color]="'white'" [number]="gameBankHexagons['white']" [type]="'gameBank'"></app-hexagon>
                    </button>
                    <button class="roll-wrapper" type="button" aria-label="Green bank" (click)="onHexagonClick('green')" [disabled]="isHexagonDisabled('green')">
                        <app-hexagon [color]="'green'" [number]="gameBankHexagons['green']" [type]="'gameBank'"></app-hexagon>
                    </button>
                    <button class="roll-wrapper" type="button" aria-label="Purple bank" (click)="onHexagonClick('purple')" [disabled]="isHexagonDisabled('purple')">
                        <app-hexagon [color]="'purple'" [number]="gameBankHexagons['purple']" [type]="'gameBank'"></app-hexagon>
                    </button>
                    <button class="game-button finish-turn-button" type="button" (click)="finishTurn()" [disabled]="!canFinishTurn">
                        Finish Turn
                    </button>
                    <button class="game-button cancel-tokens-button" type="button" (click)="cancelTokens()" [disabled]="!canCancelTokens">
                        Cancel Tokens
                    </button>
                </div>
            </div>
        </div>

        <app-player-column 
            [playerSlots]="rightPlayerSlots" 
            [side]="'right'" 
            [activePlayer]="activePlayer" 
            [playerNames]="playerNames"
            [editingPlayerIndex]="editingPlayerIndex"
            [playerHexagons]="playerHexagons"
            (activePlayerChange)="setActivePlayer($event)"
            (startRenameEvent)="startRename($event)"
            (saveRenameEvent)="saveRename($event.playerNumber, $event.name)"
            (cancelRenameEvent)="cancelRename()">
        </app-player-column>
    </div>

    <!-- Dice Roll Modal -->
    <div class="dice-modal-overlay" *ngIf="showDiceModal" (click)="closeDiceModal()">
        <div class="dice-modal" (click)="$event.stopPropagation()">
            <div class="dice-grid" [class.dice-grid--two]="diceResults.length === 2">
                <div class="dice-item" *ngFor="let reel of diceReels; let i = index">
                    <div class="dice-reel" [class.dice-reel--animated]="isDiceAnimationEnabled">
                        <img *ngFor="let side of reel" 
                             [src]="'assets/dice_side/' + side" 
                             [alt]="side" 
                             class="dice-image">
                    </div>
                </div>
            </div>
            <div class="dice-modal-buttons">
                <button type="button" class="dice-modal-button dice-modal-button--secondary" (click)="toggleDiceAnimation()">
                    {{ isDiceAnimationEnabled ? 'Disable Animation' : 'Enable Animation' }}
                </button>
                <button type="button" class="dice-modal-button dice-modal-button--primary" (click)="closeDiceModal()">Close</button>
            </div>
        </div>
    </div>
</div>
