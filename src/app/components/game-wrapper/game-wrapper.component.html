<div class="game-wrapper">
    <div class="game-setup" *ngIf="!playerCount">
        <div class="game-setup__panel">
            <div class="game-setup__title">Select Players</div>
            <div class="game-setup__subtitle">Choose number of players to start the game.</div>
            <div class="game-setup__buttons">
                <button type="button" class="game-setup__button" (click)="selectPlayerCount(2)">2</button>
                <button type="button" class="game-setup__button" (click)="selectPlayerCount(3)">3</button>
                <button type="button" class="game-setup__button" (click)="selectPlayerCount(4)">4</button>
                <button type="button" class="game-setup__button" (click)="selectPlayerCount(5)">5</button>
                <button type="button" class="game-setup__button" (click)="selectPlayerCount(6)">6</button>
            </div>
        </div>
    </div>

    <div class="game-layout" #gameLayout *ngIf="rows.length && playerCount">
        <app-player-column 
            [playerSlots]="leftPlayerSlots" 
            [side]="'left'" 
            [activePlayer]="activePlayer" 
            [playerNames]="playerNames"
            [editingPlayerIndex]="editingPlayerIndex"
            [playerHexagons]="playerHexagons"
            (activePlayerChange)="setActivePlayer($event)"
            (startRenameEvent)="startRename($event)"
            (saveRenameEvent)="saveRename($event.playerNumber, $event.name)"
            (cancelRenameEvent)="cancelRename()">
        </app-player-column>

        <div class="game-field">
            <div class="game-row" *ngFor="let row of rows">
                <div class="game-stack" *ngIf="row.stack.length">
                    <div class="card card--back" [ngClass]="{ 'card--view': !printModeEnabled, 'card--print': printModeEnabled }">
                        <div
                            class="card-overlay-wrap card-overlay-wrap-back card-overlay-wrap--no-reflection"
                            [ngClass]="{ 'card-overlay-wrap--no-reflection': !printModeEnabled }"
                            [ngStyle]="{ '--card-bg': 'url(' + row.backUrl + ')' }"
                        >
                            <div class="card-overlay card-overlay-back"></div>
                        </div>
                    </div>
                </div>
                <div class="game-row-cards">
                    <app-card *ngFor="let card of row.topCards" [card]="card" [disableHoverUi]="true"></app-card>
                    <ng-container *ngFor="let specialStack of row.specialStacks">
                        <div class="game-stack" *ngIf="specialStack.stack.length">
                            <app-card [card]="specialStack.topCard" [disableHoverUi]="true"></app-card>
                        </div>
                    </ng-container>
                </div>
            </div>
            <div class="game-row game-row--hex">
                    <div class="game-hex-row">
                        <button class="roll-wrapper" type="button" aria-label="Roll dice" [disabled]="isDiceRollDisabled" (click)="rollDice(diceCount)">
                            <div class="roll-label">Roll</div>
                            <app-hexagon [color]="'dice'" [number]="diceCount" [type]="'gameBank'"></app-hexagon>
                        </button>
                    <button class="roll-wrapper" type="button" aria-label="Red bank" (click)="onHexagonClick('red')" [disabled]="isHexagonDisabled('red')">
                        <app-hexagon [color]="'red'" [number]="gameBankHexagons['red']" [type]="'gameBank'"></app-hexagon>
                    </button>
                    <button class="roll-wrapper" type="button" aria-label="Blue bank" (click)="onHexagonClick('blue')" [disabled]="isHexagonDisabled('blue')">
                        <app-hexagon [color]="'blue'" [number]="gameBankHexagons['blue']" [type]="'gameBank'"></app-hexagon>
                    </button>
                    <button class="roll-wrapper" type="button" aria-label="White bank" (click)="onHexagonClick('white')" [disabled]="isHexagonDisabled('white')">
                        <app-hexagon [color]="'white'" [number]="gameBankHexagons['white']" [type]="'gameBank'"></app-hexagon>
                    </button>
                    <button class="roll-wrapper" type="button" aria-label="Green bank" (click)="onHexagonClick('green')" [disabled]="isHexagonDisabled('green')">
                        <app-hexagon [color]="'green'" [number]="gameBankHexagons['green']" [type]="'gameBank'"></app-hexagon>
                    </button>
                    <button class="roll-wrapper" type="button" aria-label="Purple bank" (click)="onHexagonClick('purple')" [disabled]="isHexagonDisabled('purple')">
                        <app-hexagon [color]="'purple'" [number]="gameBankHexagons['purple']" [type]="'gameBank'"></app-hexagon>
                    </button>
                    <button class="game-button finish-turn-button" type="button" (click)="finishTurn()" [disabled]="!canFinishTurn">
                        Finish Turn
                    </button>
                    <button class="game-button cancel-tokens-button" type="button" (click)="cancelTokens()" [disabled]="!canCancelTokens">
                        Cancel Tokens
                    </button>
                </div>
            </div>
        </div>

        <app-player-column 
            [playerSlots]="rightPlayerSlots" 
            [side]="'right'" 
            [activePlayer]="activePlayer" 
            [playerNames]="playerNames"
            [editingPlayerIndex]="editingPlayerIndex"
            [playerHexagons]="playerHexagons"
            (activePlayerChange)="setActivePlayer($event)"
            (startRenameEvent)="startRename($event)"
            (saveRenameEvent)="saveRename($event.playerNumber, $event.name)"
            (cancelRenameEvent)="cancelRename()">
        </app-player-column>
    </div>

    <!-- Dice Roll Modal -->
    <div class="dice-modal-overlay" *ngIf="showDiceModal" (click)="closeDiceModal()">
        <div class="dice-modal" (click)="$event.stopPropagation()">
            <div class="dice-roll-debug-layout">
                <div class="dice-roll-debug-panel">
                    <div class="dice-roll-debug-panel__title">Mock Roll (Temp)</div>
                    <div class="dice-roll-debug-panel__group">
                        <button type="button" class="dice-roll-debug-panel__button" (click)="onMockRollScenario('joker', 1)">1 Joker</button>
                        <button type="button" class="dice-roll-debug-panel__button" (click)="onMockRollScenario('joker', 2)">2 Jokers</button>
                        <button type="button" class="dice-roll-debug-panel__button" (click)="onMockRollScenario('joker', 3)">3 Jokers</button>
                        <button type="button" class="dice-roll-debug-panel__button" (click)="onMockRollScenario('joker', 4)">4 Jokers</button>
                    </div>
                    <div class="dice-roll-debug-panel__group">
                        <button type="button" class="dice-roll-debug-panel__button" (click)="onMockRollScenario('cross', 1)">1 Cross</button>
                        <button type="button" class="dice-roll-debug-panel__button" (click)="onMockRollScenario('cross', 2)">2 Crosses</button>
                        <button type="button" class="dice-roll-debug-panel__button" (click)="onMockRollScenario('cross', 3)">3 Crosses</button>
                        <button type="button" class="dice-roll-debug-panel__button" (click)="onMockRollScenario('cross', 4)">4 Crosses</button>
                    </div>
                </div>

                <div class="dice-grid" [class.dice-grid--two]="diceResults.length === 2">
                    <div class="dice-item" *ngFor="let reel of diceReels; let i = index" [class.dice-item--disabled]="isDiceDisabled(i)">
                        <div class="dice-reel" [class.dice-reel--animated]="isDiceAnimationEnabled">
                            <img *ngFor="let side of reel" 
                                 [src]="'assets/dice_side/' + side" 
                                 [alt]="side" 
                                 class="dice-image">
                        </div>
                    </div>
                </div>
            </div>
            <div class="tokens-by-dice-block">
                <div class="tokens-by-dice-warning">Token Bank

									<div class="tokens-by-dice-warning-small" *ngIf="luckyPurple">Lucky Purple: {{ luckyPurple }}</div>
								</div>
                <div class="tokens-by-dice-options tokens-by-dice-options--bank">
                    <div class="tokens-by-dice-item tokens-by-dice-item--token" (click)="onTokenBankModalClick('red')" [class.tokens-by-dice-item--disabled]="isTokenBankModalDisabled('red')" [attr.aria-disabled]="isTokenBankModalDisabled('red')">
                        <app-hexagon [color]="'red'" [number]="modalTokenBankHexagons['red']" [type]="'gameBank'"></app-hexagon>
                    </div>
                    <div class="tokens-by-dice-item tokens-by-dice-item--token" (click)="onTokenBankModalClick('blue')" [class.tokens-by-dice-item--disabled]="isTokenBankModalDisabled('blue')" [attr.aria-disabled]="isTokenBankModalDisabled('blue')">
                        <app-hexagon [color]="'blue'" [number]="modalTokenBankHexagons['blue']" [type]="'gameBank'"></app-hexagon>
                    </div>
                    <div class="tokens-by-dice-item tokens-by-dice-item--token" (click)="onTokenBankModalClick('white')" [class.tokens-by-dice-item--disabled]="isTokenBankModalDisabled('white')" [attr.aria-disabled]="isTokenBankModalDisabled('white')">
                        <app-hexagon [color]="'white'" [number]="modalTokenBankHexagons['white']" [type]="'gameBank'"></app-hexagon>
                    </div>
                    <div class="tokens-by-dice-item tokens-by-dice-item--token" (click)="onTokenBankModalClick('green')" [class.tokens-by-dice-item--disabled]="isTokenBankModalDisabled('green')" [attr.aria-disabled]="isTokenBankModalDisabled('green')">
                        <app-hexagon [color]="'green'" [number]="modalTokenBankHexagons['green']" [type]="'gameBank'"></app-hexagon>
                    </div>
                    <div class="tokens-by-dice-item tokens-by-dice-item--token" (click)="onTokenBankModalClick('purple')" [class.tokens-by-dice-item--disabled]="isTokenBankModalDisabled('purple')" [attr.aria-disabled]="isTokenBankModalDisabled('purple')">
                        <app-hexagon [color]="'purple'" [number]="modalTokenBankHexagons['purple']" [type]="'gameBank'"></app-hexagon>
                    </div>
                </div>
            </div>

            <div class="tokens-by-dice-arrows" aria-hidden="true">
                <span class="tokens-by-dice-arrow" *ngFor="let _ of [1, 2, 3, 4, 5]"></span>
            </div>

						<!-- Dice Modal Rows -->
                        <div class="tokens-by-dice-block">
													<div class="tokens-by-dice-warning">Tokens <p>in Hand</p></div>
                            <div class="tokens-by-dice-options tokens-by-dice-options--hand">
                                <div class="tokens-by-dice-item tokens-by-dice-item--token" (click)="onTokensInHandClick('red')" [class.tokens-by-dice-item--disabled]="isTokenInHandDisabled('red')" [attr.aria-disabled]="isTokenInHandDisabled('red')">
                                    <app-hexagon [color]="'red'" [number]="modalHandHexagons['red'] ?? 0" [type]="'playerBank'"></app-hexagon>
                                </div>
                                <div class="tokens-by-dice-item tokens-by-dice-item--token" (click)="onTokensInHandClick('blue')" [class.tokens-by-dice-item--disabled]="isTokenInHandDisabled('blue')" [attr.aria-disabled]="isTokenInHandDisabled('blue')">
                                    <app-hexagon [color]="'blue'" [number]="modalHandHexagons['blue'] ?? 0" [type]="'playerBank'"></app-hexagon>
                                </div>
                                <div class="tokens-by-dice-item tokens-by-dice-item--token" (click)="onTokensInHandClick('white')" [class.tokens-by-dice-item--disabled]="isTokenInHandDisabled('white')" [attr.aria-disabled]="isTokenInHandDisabled('white')">
                                    <app-hexagon [color]="'white'" [number]="modalHandHexagons['white'] ?? 0" [type]="'playerBank'"></app-hexagon>
                                </div>
                                <div class="tokens-by-dice-item tokens-by-dice-item--token" (click)="onTokensInHandClick('green')" [class.tokens-by-dice-item--disabled]="isTokenInHandDisabled('green')" [attr.aria-disabled]="isTokenInHandDisabled('green')">
                                    <app-hexagon [color]="'green'" [number]="modalHandHexagons['green'] ?? 0" [type]="'playerBank'"></app-hexagon>
                                </div>
                                <div class="tokens-by-dice-item tokens-by-dice-item--token" (click)="onTokensInHandClick('purple')" [class.tokens-by-dice-item--disabled]="isTokenInHandDisabled('purple')" [attr.aria-disabled]="isTokenInHandDisabled('purple')">
                                    <app-hexagon [color]="'purple'" [number]="modalHandHexagons['purple'] ?? 0" [type]="'playerBank'"></app-hexagon>
                                </div>
                            </div>
						</div>

            <div class="tokens-by-dice-arrows" aria-hidden="true" *ngIf="showTokensToDiscardBlock">
                <span class="tokens-by-dice-arrow" *ngFor="let _ of [1, 2, 3, 4, 5]"></span>
            </div>

            <div class="tokens-by-dice-block" *ngIf="showTokensToDiscardBlock">
                <div class="tokens-by-dice-warning">Tokens to <p>Discard: {{ tokensToDiscard }}</p></div>
                <div class="tokens-by-dice-options tokens-by-dice-options--discard">
                    <div class="tokens-by-dice-item tokens-by-dice-item--token tokens-by-dice-item--disabled">
                        <app-hexagon [color]="'red'" [number]="modalDiscardHexagons['red'] ?? 0" [type]="'playerBank'"></app-hexagon>
                    </div>
                    <div class="tokens-by-dice-item tokens-by-dice-item--token tokens-by-dice-item--disabled">
                        <app-hexagon [color]="'blue'" [number]="modalDiscardHexagons['blue'] ?? 0" [type]="'playerBank'"></app-hexagon>
                    </div>
                    <div class="tokens-by-dice-item tokens-by-dice-item--token tokens-by-dice-item--disabled">
                        <app-hexagon [color]="'white'" [number]="modalDiscardHexagons['white'] ?? 0" [type]="'playerBank'"></app-hexagon>
                    </div>
                    <div class="tokens-by-dice-item tokens-by-dice-item--token tokens-by-dice-item--disabled">
                        <app-hexagon [color]="'green'" [number]="modalDiscardHexagons['green'] ?? 0" [type]="'playerBank'"></app-hexagon>
                    </div>
                    <div class="tokens-by-dice-item tokens-by-dice-item--token tokens-by-dice-item--disabled">
                        <app-hexagon [color]="'purple'" [number]="modalDiscardHexagons['purple'] ?? 0" [type]="'playerBank'"></app-hexagon>
                    </div>
                </div>
            </div>

            <div class="lucky-purple-modal-overlay" *ngIf="showLuckyPurpleChoiceModal" (click)="$event.stopPropagation()">
                <div class="lucky-purple-modal">
                    <div class="lucky-purple-modal__title">Choose Purple Bonus</div>
                    <div class="lucky-purple-modal__subtitle">Select how many purple tokens to take.</div>
                    <div class="lucky-purple-modal__options">
                        <button
                            type="button"
                            class="lucky-purple-modal__option"
                            *ngFor="let option of luckyPurpleSelectionOptions"
                            (click)="confirmLuckyPurpleSelection(option)">
                            {{ option }}
                        </button>
                    </div>
                    <button
                        type="button"
                        class="lucky-purple-modal__cancel"
                        (click)="cancelLuckyPurpleSelection()">
                        Cancel
                    </button>
                </div>
            </div>

            <div class="dice-modal-buttons">
                <button type="button" class="dice-modal-button dice-modal-button--secondary" (click)="toggleDiceAnimation()">
                    {{ isDiceAnimationEnabled ? 'Disable Animation' : 'Enable Animation' }}
                </button>
                <button type="button" class="dice-modal-button dice-modal-button--primary" (click)="closeDiceModal()" [disabled]="!canCloseDiceModal">Close</button>
                <button type="button" class="dice-modal-button dice-modal-button--primary" (click)="reRoll()">Reroll</button>
            </div>
        </div>
    </div>
</div>
